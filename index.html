<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוניטור תור</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0e1a2b;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #1a2d45;
    border-radius: 16px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    width: 100%;
    max-width: 320px;
  }
  .title {
    font-size: 14px;
    color: #7a9cc4;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .queue-number {
    font-size: 96px;
    font-weight: 900;
    line-height: 1;
    margin: 10px 0;
    transition: color 0.5s;
  }
  .low    { color: #4cde80; }
  .medium { color: #f5a623; }
  .high   { color: #e74c3c; }
  .label {
    font-size: 16px;
    color: #7a9cc4;
    margin-bottom: 20px;
  }
  .status {
    font-size: 12px;
    color: #4a6a8a;
    margin-top: 16px;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4cde80;
    margin-left: 6px;
    animation: pulse 2s infinite;
  }
  .dot.error { background: #e74c3c; animation: none; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="title">שיחות ממתינות בתור</div>
  <div class="queue-number low" id="totalQueue">--</div>
  <div class="label">שיחות</div>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">מתחבר...</span>
  </div>
</div>

<script>
const ACCOUNT_ID  = "30158593";
const FUNCTION_ID = "774f1b7b-9dac-4a0e-a85d-73ac7508bbd6";
const API_URL = `https://euwe1.faas.liveperson.net/api/account/${ACCOUNT_ID}/lambdas/${FUNCTION_ID}/invoke`;

async function fetchQueueData() {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ timestamp: Date.now(), headers: [], payload: {} })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    updateUI(data);
  } catch (e) {
    showError(e.message);
  }
}

function updateUI(data) {
  const total = data.currentQueueSize || 0;
  const el = document.getElementById("totalQueue");
  el.textContent = total;
  el.className = "queue-number " + (total === 0 ? "low" : total <= 5 ? "medium" : "high");
  document.getElementById("dot").className = "dot";
  document.getElementById("statusText").textContent =
    "עודכן: " + new Date().toLocaleTimeString("he-IL");
}

function showError(msg) {
  document.getElementById("totalQueue").textContent = "!";
  document.getElementById("totalQueue").className = "queue-number high";
  document.getElementById("dot").className = "dot error";
  document.getElementById("statusText").textContent = "שגיאה: " + msg;
}

fetchQueueData();
setInterval(fetchQueueData, 30000);
</script>
</body>
</html>
